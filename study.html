<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOEFL Vocas — Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/chomsky" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="study">
  <main class="paper">
    <header class="masthead">
      <div class="masthead__rule masthead__rule--top"></div>
      <h1 class="masthead__title">The Toefl Vocas</h1>
      <p class="masthead__subtitle">An English Vocabulary Daily &mdash; 토플 어휘 신문</p>
      <div class="masthead__rule masthead__rule--bottom"></div>
      <div class="masthead__meta">
        <span>Vol. I &middot; No. 1</span>
        <span>2026년 4월 28일 &middot; 화요일</span>
        <span>Late Edition</span>
      </div>
    </header>

    <nav class="mode-toggle" aria-label="View mode">
      <a href="index.html" class="mode-toggle__item">Index</a>
      <span class="mode-toggle__sep">·</span>
      <a href="study.html" class="mode-toggle__item is-active">Study</a>
      <span class="mode-toggle__sep">·</span>
      <a href="test.html" class="mode-toggle__item">Test</a>
    </nav>

    <section class="editions" aria-label="Day selector">
      <span class="editions__label">Editions</span>
      <div class="editions__list"></div>
    </section>

    <section class="dateline">
      <span class="dateline__day">Day 1</span>
      <span class="dateline__sep">·</span>
      <span class="dateline__topic">Study Session</span>
      <span class="dateline__sep">·</span>
      <span class="dateline__progress">— / —</span>
    </section>

    <article class="entry" id="entry">
      <div class="entry__pos">&nbsp;</div>
      <h2 class="entry__word">&nbsp;</h2>
      <div class="entry__phonetic">
        <span class="ipa">&nbsp;</span>
        <button class="speak" type="button" aria-label="Listen">▶&nbsp;listen</button>
      </div>

      <p class="entry__lede">&nbsp;</p>

      <div class="entry__columns">
        <section>
          <h3 class="kicker">In daily American use</h3>
          <p class="entry__american">&nbsp;</p>
        </section>

        <section>
          <h3 class="kicker">In TOEFL reading</h3>
          <p class="entry__toefl">&nbsp;</p>
        </section>
      </div>

      <blockquote class="entry__quote">&nbsp;</blockquote>
    </article>

    <nav class="pager">
      <button class="pager__prev" type="button">◀&nbsp;Previous</button>
      <div class="pager__center">
        <button class="pager__pause" type="button" aria-label="Pause TTS">❚❚&nbsp;Pause</button>
        <span class="pager__count">— / —</span>
      </div>
      <button class="pager__next" type="button">Next&nbsp;▶</button>
    </nav>
  </main>
  <script src="app.js"></script>
</body>
</html>
