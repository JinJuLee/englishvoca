<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOEFL Vocas — Index</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/chomsky" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="index">
  <main class="paper">
    <header class="masthead">
      <div class="masthead__rule masthead__rule--top"></div>
      <h1 class="masthead__title">The Toefl Vocas</h1>
      <p class="masthead__subtitle">An English Vocabulary Daily &mdash; 토플 어휘 신문</p>
      <div class="masthead__rule masthead__rule--bottom"></div>
      <div class="masthead__meta">
        <span>Vol. I &middot; No. 1</span>
        <span>2026년 4월 28일 &middot; 화요일</span>
        <span>Late Edition</span>
      </div>
    </header>

    <nav class="mode-toggle" aria-label="View mode">
      <a href="index.html" class="mode-toggle__item is-active">Index</a>
      <span class="mode-toggle__sep">·</span>
      <a href="study.html" class="mode-toggle__item">Study</a>
      <span class="mode-toggle__sep">·</span>
      <a href="add.html" class="mode-toggle__item">Add</a>
    </nav>

    <section class="editions" aria-label="Day selector">
      <span class="editions__label">Editions</span>
      <div class="editions__list">
        <button class="edition is-active" type="button" data-day="1">01</button>
        <button class="edition is-done" type="button" data-day="2">02</button>
        <button class="edition is-done" type="button" data-day="3">03</button>
        <button class="edition" type="button" data-day="4">04</button>
        <button class="edition" type="button" data-day="5">05</button>
        <button class="edition" type="button" data-day="6">06</button>
        <button class="edition" type="button" data-day="7">07</button>
        <button class="edition" type="button" data-day="8">08</button>
        <button class="edition" type="button" data-day="9">09</button>
        <button class="edition" type="button" data-day="10">10</button>
        <button class="edition" type="button" data-day="11">11</button>
        <button class="edition" type="button" data-day="12">12</button>
        <button class="edition" type="button" data-day="13">13</button>
        <button class="edition" type="button" data-day="14">14</button>
        <button class="edition" type="button" data-day="15">15</button>
        <button class="edition" type="button" data-day="16">16</button>
        <button class="edition" type="button" data-day="17">17</button>
        <button class="edition" type="button" data-day="18">18</button>
        <button class="edition" type="button" data-day="19">19</button>
        <button class="edition" type="button" data-day="20">20</button>
        <button class="edition" type="button" data-day="21">21</button>
        <button class="edition" type="button" data-day="22">22</button>
        <button class="edition" type="button" data-day="23">23</button>
        <button class="edition" type="button" data-day="24">24</button>
        <button class="edition" type="button" data-day="25">25</button>
        <button class="edition" type="button" data-day="26">26</button>
        <button class="edition" type="button" data-day="27">27</button>
        <button class="edition" type="button" data-day="28">28</button>
        <button class="edition" type="button" data-day="29">29</button>
        <button class="edition" type="button" data-day="30">30</button>
        <button class="edition edition--custom" type="button" data-day="custom" aria-label="Custom words">+</button>
      </div>
    </section>

    <section class="dateline">
      <span class="dateline__day">Day 1</span>
      <span class="dateline__sep">·</span>
      <span class="dateline__topic">Today's Index — 12 Words for Reading</span>
      <span class="dateline__sep">·</span>
      <span class="dateline__progress">3 / 12 memorized</span>
    </section>

    <table class="index-table">
      <thead>
        <tr>
          <th class="col-num">№</th>
          <th class="col-word">Word</th>
          <th class="col-meaning">한글 뜻</th>
          <th class="col-listen" aria-label="listen"></th>
          <th class="col-status" aria-label="memorized">✓</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="5" style="padding:32px;text-align:center;font-style:italic;color:var(--ink-soft)">Loading today's edition…</td></tr>
      </tbody>
    </table>

  </main>
  <script src="app.js"></script>
</body>
</html>
